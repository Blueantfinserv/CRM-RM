<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blueant Finserv — Client Interaction Form</title>
<style>
  :root {
    --navy:         #1A2B4A;
    --orange:       #F26522;
    --orange-light: #FFF0E8;
    --slate:        #4A5568;
    --line:         #E2E8F0;
    --bg:           #F7F9FC;
    --white:        #FFFFFF;
    --red:          #E53E3E;
    --green:        #38A169;
    --radius:       10px;
    --shadow:       0 4px 24px rgba(26,43,74,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
  }

  header {
    width: 100%; background: var(--navy);
    padding: 18px 32px; display: flex; align-items: center; gap: 14px;
  }
  .logo-mark {
    width: 38px; height: 38px; background: var(--orange);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-weight: 800; color: #fff; font-size: 18px;
  }
  .brand { color: #fff; font-size: 18px; font-weight: 700; }
  .brand span { color: var(--orange); }

  .card {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--shadow); width: 100%; max-width: 560px;
    margin: 40px 16px 60px; overflow: hidden;
  }
  .card-top {
    background: var(--navy); padding: 28px 32px 22px;
    border-bottom: 4px solid var(--orange);
  }
  .card-top h1 { color: #fff; font-size: 22px; font-weight: 700; }
  .card-top p  { color: #9AADCC; font-size: 13.5px; margin-top: 4px; }
  .card-body { padding: 32px; }

  /* Email chip */
  .email-chip {
    display: flex; align-items: center; gap: 10px;
    background: #EEF2FF; border: 1.5px solid #C7D2FE;
    border-radius: 8px; padding: 10px 14px; margin-bottom: 24px;
  }
  .email-chip-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
  }
  .email-chip-text { font-size: 13.5px; color: var(--navy); }
  .email-chip-text strong { font-weight: 700; }
  .email-chip-label {
    font-size: 11.5px; color: #6366F1; font-weight: 600;
    margin-left: auto; white-space: nowrap;
  }

  /* Not logged in warning */
  .not-logged-in {
    display: none;
    background: #FFF5F5; border: 1.5px solid #FEB2B2;
    border-radius: 8px; padding: 16px; text-align: center;
    color: var(--red); font-size: 14px; font-weight: 600;
    margin-bottom: 24px;
  }
  .not-logged-in a { color: var(--orange); text-decoration: underline; }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 4px 0 20px; color: #A0AEC0;
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px;
  }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--line); }

  .field { margin-bottom: 20px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
  label .req { color: var(--orange); margin-left: 2px; }
  .readonly-badge {
    display: inline-block; background: #EDF2F7; color: #718096;
    font-size: 11px; font-weight: 600; border-radius: 4px; padding: 1px 6px; margin-left: 6px;
  }

  input[type="text"], textarea {
    width: 100%; border: 1.5px solid var(--line);
    border-radius: var(--radius); padding: 11px 14px;
    font-size: 14px; color: var(--navy); outline: none;
    transition: border-color 0.2s; background: var(--white); font-family: inherit;
  }
  input[readonly] { background: #F8FAFC; color: var(--slate); cursor: default; }
  input:focus:not([readonly]), textarea:focus:not([readonly]) {
    border-color: var(--orange); box-shadow: 0 0 0 3px var(--orange-light);
  }
  textarea { resize: vertical; min-height: 110px; }

  .upload-zone {
    border: 2px dashed var(--line); border-radius: var(--radius);
    padding: 28px 20px; text-align: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s; position: relative;
  }
  .upload-zone:hover { border-color: var(--orange); background: var(--orange-light); }
  .upload-zone.has-file { border-color: var(--green); background: #F0FFF4; }
  .upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 30px; margin-bottom: 8px; }
  .upload-zone p { font-size: 13.5px; color: var(--slate); }
  .upload-zone p strong { color: var(--navy); }
  #file-name { font-size: 12px; color: var(--green); margin-top: 6px; font-weight: 600; display: none; }
  #preview-img {
    display: none; max-width: 100%; max-height: 160px; object-fit: contain;
    border-radius: 8px; margin-top: 12px; border: 1px solid var(--line);
  }

  .submit-btn {
    width: 100%; background: var(--orange); color: #fff; border: none;
    border-radius: var(--radius); padding: 14px; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
    margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .submit-btn:hover:not(:disabled) { background: #d9551a; }
  .submit-btn:active:not(:disabled) { transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  #toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--navy); color: #fff;
    padding: 14px 24px; border-radius: 999px; font-size: 14px; font-weight: 600;
    box-shadow: 0 8px 30px rgba(0,0,0,0.18);
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
    opacity: 0; pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.success { background: var(--green); }
  #toast.error   { background: var(--red); }

  .spinner {
    width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.4);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .card-body { padding: 24px 20px; }
    .card-top  { padding: 22px 20px 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">B</div>
  <div class="brand">Blueant <span>Finserv</span></div>
</header>

<div class="card">
  <div class="card-top">
    <h1>Client Interaction Form</h1>
    <p>Log your meeting remarks and upload supporting documents</p>
  </div>

  <div class="card-body">

    <!-- Email chip — shown when logged in -->
    <div class="email-chip" id="email-chip" style="display:none;">
      <div class="email-chip-dot"></div>
      <div class="email-chip-text">
        Submitting as <strong id="chip-email"></strong>
      </div>
      <div class="email-chip-label">Auto-detected</div>
    </div>

    <!-- Warning if not logged in -->
    <div class="not-logged-in" id="not-logged-in">
      ⚠️ You are not logged in. Please <a href="index.html">login here</a> first.
    </div>

    <div class="divider">Client Details</div>

    <div class="field">
      <label>Name of Client <span class="readonly-badge">Prefilled</span></label>
      <input type="text" id="field-name" readonly />
    </div>

    <div class="field">
      <label>Pan No. <span class="readonly-badge">Prefilled</span></label>
      <input type="text" id="field-pan" readonly />
    </div>

    <div class="divider">Your Input</div>

    <div class="field">
      <label for="field-remarks">RM's Remarks <span class="req">*</span></label>
      <textarea id="field-remarks" placeholder="Describe the interaction, follow-up notes, or any relevant details…"></textarea>
    </div>

    <div class="field">
      <label>Interaction Image <span class="req">*</span></label>
      <div style="display:flex;gap:10px;margin-bottom:10px;">
        <button type="button" onclick="document.getElementById('field-image-gallery').click()" style="flex:1;padding:11px;border:1.5px solid var(--line);border-radius:var(--radius);background:var(--white);color:var(--navy);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">🖼️ Gallery</button>
        <button type="button" onclick="document.getElementById('field-image-camera').click()" style="flex:1;padding:11px;border:1.5px solid var(--line);border-radius:var(--radius);background:var(--white);color:var(--navy);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">📷 Camera</button>
      </div>
      <input type="file" id="field-image-gallery" accept="image/*" style="display:none;" />
      <input type="file" id="field-image-camera" accept="image/*" capture="environment" style="display:none;" />
      <div class="upload-zone" id="upload-zone" style="pointer-events:none;">
        <div class="upload-icon">📎</div>
        <p><strong>Choose from Gallery or take a Photo</strong></p>
        <p style="margin-top:4px;">JPG, PNG, WEBP — max 10 MB</p>
        <div id="file-name"></div>
      </div>
      <img id="preview-img" alt="Preview" />
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitForm()">
      Submit Interaction
    </button>

  </div>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ─────────────────────────────────────────────────
const GAS_URL = "https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec";
// ──────────────────────────────────────────────────────────

let userEmail = "";

// ── On load: read from localStorage (set during login) ────
window.onload = () => {
  // Read URL params — name & pan prefilled from sheet link
  const params = new URLSearchParams(window.location.search);
  document.getElementById("field-name").value = params.get("name") || "";
  document.getElementById("field-pan").value  = params.get("pan")  || "";

  // Read email from localStorage (saved at login)
  userEmail = localStorage.getItem("userEmail") || "";

  if (userEmail) {
    document.getElementById("chip-email").textContent = userEmail;
    document.getElementById("email-chip").style.display = "flex";
    document.getElementById("not-logged-in").style.display = "none";
    document.getElementById("submit-btn").disabled = false;
  } else {
    document.getElementById("email-chip").style.display = "none";
    document.getElementById("not-logged-in").style.display = "block";
    document.getElementById("submit-btn").disabled = true;
  }
};

// ── Image preview ─────────────────────────────────────────
function handleImageSelect(file) {
  if (!file) return;
  document.getElementById("upload-zone").classList.add("has-file");
  const nameEl = document.getElementById("file-name");
  nameEl.textContent = "✓ " + file.name;
  nameEl.style.display = "block";
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById("preview-img");
    img.src = e.target.result;
    img.style.display = "block";
  };
  reader.readAsDataURL(file);
}
document.getElementById("field-image-gallery").addEventListener("change", function() { handleImageSelect(this.files[0]); });
document.getElementById("field-image-camera").addEventListener("change",  function() { handleImageSelect(this.files[0]); });

// ── Submit ────────────────────────────────────────────────
async function submitForm() {
  const name    = document.getElementById("field-name").value.trim();
  const pan     = document.getElementById("field-pan").value.trim();
  const remarks = document.getElementById("field-remarks").value.trim();
  const imageInput = document.getElementById("field-image-gallery").files.length ? document.getElementById("field-image-gallery") : document.getElementById("field-image-camera");

  if (!remarks)                 { showToast("Please enter RM's Remarks.", "error"); return; }
  if (!imageInput.files.length) { showToast("Please attach an image.", "error"); return; }
  if (!userEmail)               { showToast("Not logged in. Please login first.", "error"); return; }

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Submitting…';

  try {
    const file = imageInput.files[0];
    const { base64, mime } = await readFileBase64(file);

    await fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({ email: userEmail, name, pan, remarks, imageBase64: base64, imageMime: mime, imageName: file.name }),
    });

    // no-cors means we can't read response — but GAS always receives it
    showToast("✓ Submitted successfully!", "success");
    document.getElementById("field-remarks").value = "";
    document.getElementById("field-image").value = "";
    document.getElementById("upload-zone").classList.remove("has-file");
    document.getElementById("file-name").style.display = "none";
    document.getElementById("preview-img").style.display = "none";
  } catch (err) {
    showToast("Network error. Please try again.", "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "Submit Interaction";
  }
}

function readFileBase64(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const MAX = 1024;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.75);
      const [header, base64] = dataUrl.split(",");
      const mime = header.match(/:(.*?);/)[1];
      URL.revokeObjectURL(url);
      resolve({ base64, mime });
    };
    img.onerror = reject;
    img.src = url;
  });
}

function showToast(msg, type = "info") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "show " + type;
  setTimeout(() => { el.className = ""; }, 3500);
}
</script>
</body>
</html>
